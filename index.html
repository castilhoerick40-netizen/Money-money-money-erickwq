<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#000;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* PARTICULAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* CARD */
.box{
position:relative;
z-index:1;
width:330px;
padding:25px;
border-radius:28px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(30px);
box-shadow:0 0 50px rgba(255,0,120,0.5);
text-align:center;
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.9);}
to{opacity:1;}
}

.box::before{
content:"";
position:absolute;
inset:-2px;
border-radius:28px;
background:#ff0055;
filter:blur(30px);
opacity:.3;
z-index:-1;
}

/* INPUT */
input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

/* BOTÃO */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:16px;
background:#ff0055;
color:white;
font-weight:bold;
box-shadow:0 0 25px #ff0055;
}

/* CARD INTERNO */
.card{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:14px;
margin-top:10px;
}

/* SWITCH */
.switch{
position:relative;
display:inline-block;
width:42px;height:22px;
}
.switch input{display:none;}
.slider{
position:absolute;
inset:0;
background:#333;
border-radius:30px;
}
.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
background:white;
left:2px;bottom:2px;
border-radius:50%;
transition:.3s;
}
input:checked + .slider{
background:#ff0055;
}
input:checked + .slider:before{
transform:translateX(20px);
}

.hidden{display:none;}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>ERICK.WQ</h2>
<input id="key" placeholder="Digite sua key">
<button onclick="login()">ENTRAR</button>
</div>

<!-- PAINEL -->
<div class="box hidden" id="painel">

<h3>Painel Premium</h3>

<div class="card">
Aimbot
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
Sem Recuo
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
FOV <span id="fovv">50</span>
<input type="range" min="0" max="100" value="50" id="fov">
</div>

<button onclick="ativar()">ATIVAR</button>

<p id="status"></p>

</div>

<script>

// 🔑 KEY FIXA
const KEY_CORRETA = "Rkz-key-2026-aimbot";

// LOGIN
function login(){

let k = document.getElementById("key").value.trim();

if(k !== KEY_CORRETA){
alert("Key inválida");
return;
}

// LIBERA
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("painel").classList.remove("hidden");

}

// FOV
document.getElementById("fov").oninput = function(){
document.getElementById("fovv").innerText = this.value;
}

// ATIVAR
function ativar(){
let s = document.getElementById("status");

s.innerHTML="🟢 Iniciando...";
setTimeout(()=>s.innerHTML+="<br>Carregando módulos...",1000);
setTimeout(()=>s.innerHTML+="<br>Finalizado ✅",2000);
}

/* PARTICULAS */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let p=[];

for(let i=0;i<100;i++){
p.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
d:Math.random()*0.5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(255,0,120,0.4)";
p.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=e.d;
if(e.y>c.height){
e.y=0;
e.x=Math.random()*c.width;
}
});
}

setInterval(draw,30);

</script>

</body>
</html>
