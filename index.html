<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
background:#0b0014;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* 🌧️ CHUVA */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* 🔐 LOGIN */
.login{
position:absolute;
z-index:2;
width:300px;
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 30px #a855f7;
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#000;
color:white;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#9333ea,#c084fc);
color:white;
font-weight:bold;
}

/* 💜 CARD PRINCIPAL */
.container{
display:none;
position:relative;
z-index:2;
width:340px;
background:rgba(20,10,40,0.7);
border-radius:25px;
backdrop-filter: blur(20px);
box-shadow:0 0 40px rgba(168,85,247,0.6);
padding:15px;
}

.title{
text-align:center;
font-weight:bold;
margin-bottom:10px;
}

/* MENU */
.menu{
display:flex;
}

.sidebar{
width:60px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar button{
height:60px;
border-radius:15px;
background:#1a0033;
}

.sidebar button.active{
background:linear-gradient(45deg,#9333ea,#c084fc);
}

.content{
flex:1;
padding-left:10px;
}

/* CARDS */
.option{
display:flex;
align-items:center;
justify-content:space-between;
background:#140028;
padding:10px;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.option.active{
background:#9333ea;
}

/* SLIDER */
input[type=range]{
width:100%;
margin-top:10px;
}

/* BOTÃO INJETAR */
.inject{
margin-top:15px;
background:linear-gradient(45deg,#9333ea,#c084fc);
box-shadow:0 0 20px #9333ea;
}

/* STATUS */
#status{
margin-top:10px;
font-size:13px;
opacity:.9;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>Erick Auxílio</h2>
<input id="key" placeholder="Digite a key">
<button onclick="login()">ENTRAR</button>
</div>

<!-- PAINEL -->
<div class="container" id="painel">

<div class="title">Erick Auxílio</div>

<div class="menu">

<div class="sidebar">
<button onclick="show('aim')" class="active">🎯</button>
<button onclick="show('fps')">⚡</button>
<button onclick="show('info')">ℹ️</button>
</div>

<div class="content">

<!-- AIM -->
<div id="aim" class="page">
<div class="option" onclick="toggle(this)">Ativar AimTrick</div>
<div class="option" onclick="toggle(this)">No Recoil</div>
<div class="option" onclick="toggle(this)">Aumentar precisão</div>
<div class="option" onclick="toggle(this)">Ativar AimLock</div>

FOV <span id="fovv">50</span>
<input type="range" min="0" max="100" value="50" id="fov">

<button class="inject" onclick="inje()">INJETAR</button>
</div>

<!-- FPS -->
<div id="fps" class="page" style="display:none;">
<div class="option" onclick="toggle(this)">Aumentar FPS</div>
<div class="option" onclick="toggle(this)">Reduzir Lag</div>
<div class="option" onclick="toggle(this)">Otimização máxima</div>

<button class="inject" onclick="inje()">INJETAR</button>
</div>

<!-- INFO -->
<div id="info" class="page" style="display:none;">
<p>Criado por: Erick</p>
<p>Versão: Premium</p>
<p>Dica: Use no treino 😉</p>
</div>

</div>
</div>

<p id="status"></p>

</div>

<script>

/* 🔑 KEY FIXA */
const KEY = "Rkz-key-2026-aimbot";

function login(){
if(key.value !== KEY){
alert("Key inválida");
return;
}
loginBox.style.display="none";
painel.style.display="block";
}

/* MENU */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";

document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

/* TOGGLE */
function toggle(el){
el.classList.toggle("active");
}

/* FOV */
fov.oninput=()=>fovv.innerText=fov.value;

/* 🚀 ANIMAÇÃO INJETAR */
function inje(){
let s=document.getElementById("status");

s.innerHTML="🟣 Iniciando...";

setTimeout(()=>{
s.innerHTML+="<br>Carregando módulos...";
},1000);

setTimeout(()=>{
s.innerHTML+="<br>Otimizando sistema...";
},2000);

setTimeout(()=>{
s.innerHTML+="<br>Finalizado com sucesso ✅";
},3000);
}

/* 🌧️ CHUVA */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let rain=[];

for(let i=0;i<150;i++){
rain.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
l:Math.random()*20,
d:Math.random()*5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.strokeStyle="rgba(168,85,247,0.5)";
ctx.lineWidth=1;

rain.forEach(r=>{
ctx.beginPath();
ctx.moveTo(r.x,r.y);
ctx.lineTo(r.x,r.y+r.l);
ctx.stroke();

r.y+=r.d;

if(r.y>c.height){
r.y=0;
r.x=Math.random()*c.width;
}
});
}

setInterval(draw,30);

</script>

</body>
</html>
