<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
background:#000;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* 🌌 PARTICULAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* 🧊 CARD IOS */
.box{
position:relative;
z-index:1;
width:330px;
padding:25px;
border-radius:28px;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(30px);
box-shadow:0 0 50px rgba(255,0,120,0.5);
text-align:center;
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:scale(.9);}
to{opacity:1;}
}

.box::before{
content:"";
position:absolute;
inset:-2px;
border-radius:28px;
background:#ff0055;
filter:blur(30px);
opacity:.3;
z-index:-1;
}

/* INPUT */
input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
}

/* BOTÃO */
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:16px;
background:#ff0055;
color:white;
font-weight:bold;
box-shadow:0 0 25px #ff0055;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:14px;
margin-top:10px;
}

/* SWITCH */
.switch{
position:relative;
display:inline-block;
width:42px;height:22px;
}
.switch input{display:none;}
.slider{
position:absolute;
inset:0;
background:#333;
border-radius:30px;
}
.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
background:white;
left:2px;bottom:2px;
border-radius:50%;
transition:.3s;
}
input:checked + .slider{
background:#ff0055;
}
input:checked + .slider:before{
transform:translateX(20px);
}

.hidden{display:none;}

.timer{
margin-top:10px;
font-size:13px;
opacity:.8;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>ERICK.WQ</h2>
<input id="key" placeholder="Digite sua key">
<button onclick="login()">ENTRAR</button>
</div>

<!-- PAINEL -->
<div class="box hidden" id="painel">

<h3>Painel</h3>

<div class="timer" id="tempo"></div>

<div class="card">
Aimbot
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
Sem Recuo
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
FOV <span id="fovv">50</span>
<input type="range" min="0" max="100" value="50" id="fov">
</div>

<button onclick="ativar()">ATIVAR</button>

<p id="status"></p>

</div>

<script>
  
// 🔐 DEVICE ID
let deviceID = localStorage.getItem("deviceID");
if(!deviceID){
deviceID = Math.random().toString(36).substring(2);
localStorage.setItem("deviceID", deviceID);
}

// 🔑 COLE AQUI O JSON DO SCRIPTABLE
let keys = [yas12]; // <-- COLE AQUI

// LOGIN
function login(){

let k = key.value;
let obj = keys.find(x=>x.key===k);

if(!obj) return alert("Key inválida");

// 🔒 BLOQUEIO POR DISPOSITIVO
if(!obj.devices.includes(deviceID)){

// se já tem outro device
if(obj.devices.length >= 1){
return alert("Key já usada em outro aparelho");
}

// registra
obj.devices.push(deviceID);
}

// ⏱ EXPIRAÇÃO
if(Date.now()>obj.exp){
return alert("Key expirada");
}

userKey = obj;

loginBox.classList.add("hidden");
painel.classList.remove("hidden");

}

// TIMER
setInterval(()=>{
if(userKey){
tempo.innerText =
"Tempo restante: " +
formatar(userKey.exp - Date.now()) +
" | Devices: " + userKey.devices.length;
}
},1000);
/* FOV */
fov.oninput = () => fovv.innerText = fov.value;

/* ATIVAR */
function ativar(){
status.innerHTML="🟢 Iniciando...";
setTimeout(()=>status.innerHTML+="<br>Carregando módulos...",1000);
setTimeout(()=>status.innerHTML+="<br>Finalizado ✅",2000);
}

/* 🌌 PARTICULAS PREMIUM */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let p=[];

for(let i=0;i<100;i++){
p.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
d:Math.random()*0.5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(255,0,120,0.4)";
p.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=e.d;
if(e.y>c.height){
e.y=0;
e.x=Math.random()*c.width;
}
});
}

setInterval(draw,30);

</script>

</body>
</html>
