<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:#0b0615;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* FUNDO ANIMADO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(180deg,transparent,#8a2be2);
opacity:.2;
animation:move 5s linear infinite;
}
@keyframes move{
0%{transform:translateY(-100%);}
100%{transform:translateY(100%);}
}

/* CARD PRINCIPAL */
.container{
width:340px;
background:rgba(20,10,40,0.8);
border-radius:20px;
padding:15px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px #8a2be2;
}

/* SIDEBAR */
.sidebar{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar button{
width:50px;
height:50px;
border:none;
border-radius:15px;
background:#1a0f30;
color:white;
font-size:18px;
}

.sidebar button.active{
background:#8a2be2;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:10px;
}

.header h2{
margin:0;
font-size:18px;
}

/* CARDS */
.card{
background:#140a28;
padding:12px;
border-radius:12px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* SWITCH */
.switch{
position:relative;
display:inline-block;
width:40px;height:20px;
}
.switch input{display:none;}
.slider{
position:absolute;
inset:0;
background:#333;
border-radius:20px;
}
.slider:before{
content:"";
position:absolute;
width:16px;height:16px;
background:white;
left:2px;bottom:2px;
border-radius:50%;
transition:.3s;
}
input:checked + .slider{
background:#8a2be2;
}
input:checked + .slider:before{
transform:translateX(20px);
}

/* RANGE */
input[type=range]{
width:100%;
}

/* BOTÃO */
.inject{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#8a2be2,#ff00ff);
color:white;
font-weight:bold;
font-size:16px;
box-shadow:0 0 20px #8a2be2;
}

/* LOGIN */
.login{
text-align:center;
}

.login input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:#140a28;
color:white;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="login">
<h2>MIKASA AUXÍLIO</h2>
<input id="key" placeholder="Digite sua key">
<button class="inject" onclick="login()">ENTRAR</button>
</div>

<!-- PAINEL -->
<div id="painel" class="hidden">

<div class="sidebar">
<button onclick="show('aim')" class="active">🎯</button>
<button onclick="show('fps')">⚡</button>
<button onclick="show('info')">ℹ️</button>
</div>

<div class="header">
<h2>MIKASA AUXÍLIO</h2>
</div>

<!-- AIM -->
<div id="aim" class="page">
<div class="card">Aimbot
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">No Recoil
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
FOV <span id="fovv">50</span>
<input type="range" min="0" max="100" value="50" id="fov">
</div>
</div>

<!-- FPS -->
<div id="fps" class="page hidden">
<div class="card">+60 FPS
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">Alta Fluidez
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">Sem Lag
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>
</div>

<!-- INFO -->
<div id="info" class="page hidden">
<p>Criado por: Erick</p>
<p>Versão: Premium</p>
<p>Status: Online</p>
</div>

<button class="inject" onclick="inje()">INJETAR</button>

<p id="status"></p>

</div>
</div>

<script>

/* KEY FIXA */
const KEY = "Rkz-key-2026-aimbot";

/* LOGIN */
function login(){
let k = document.getElementById("key").value.trim();

if(k !== KEY){
alert("Key inválida");
return;
}

loginBox.classList.add("hidden");
painel.classList.remove("hidden");
}

/* PÁGINAS */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* FOV */
fov.oninput = () => fovv.innerText = fov.value;

/* INJETAR */
function inje(){
let s=document.getElementById("status");

s.innerHTML="🟢 Iniciando...";
setTimeout(()=>s.innerHTML+="<br>Carregando módulos...",1000);
setTimeout(()=>s.innerHTML+="<br>Aplicando melhorias...",2000);
setTimeout(()=>s.innerHTML+="<br>Finalizado ✅",3000);
}

</script>

</body>
</html>
