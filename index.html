<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#000;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* PARTICULAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* LOGIN */
.login{
position:relative;
z-index:1;
width:300px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
box-shadow:0 0 40px rgba(255,0,120,0.5);
text-align:center;
}

/* INPUT */
input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
background:rgba(255,255,255,0.08);
color:white;
}

/* BOTÃO */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
background:#ff0055;
color:white;
font-weight:bold;
box-shadow:0 0 20px #ff0055;
}

/* PAINEL */
.container{
display:none;
width:360px;
height:520px;
background:rgba(20,20,20,0.9);
border-radius:25px;
box-shadow:0 0 40px #ff0055;
overflow:hidden;
position:relative;
z-index:1;
}

/* MENU */
.menu{
display:flex;
height:100%;
}

.sidebar{
width:70px;
background:#000;
display:flex;
flex-direction:column;
}

.sidebar button{
height:70px;
background:none;
border:none;
color:white;
font-size:20px;
}

/* CONTENT */
.content{
flex:1;
padding:15px;
overflow-y:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:12px;
margin-top:10px;
border-radius:14px;
}

/* SWITCH */
.switch{
position:relative;
display:inline-block;
width:42px;height:22px;
}
.switch input{display:none;}
.slider{
position:absolute;
inset:0;
background:#333;
border-radius:30px;
}
.slider:before{
content:"";
position:absolute;
width:18px;height:18px;
background:white;
left:2px;bottom:2px;
border-radius:50%;
transition:.3s;
}
input:checked + .slider{
background:#ff0055;
}
input:checked + .slider:before{
transform:translateX(20px);
}

.page{display:none;}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- LOGIN -->
<div class="login" id="loginBox">
<h2>ERICK.WQ</h2>
<input id="key" placeholder="Digite sua key">
<button onclick="login()">ENTRAR</button>
</div>

<!-- PAINEL -->
<div class="container" id="painel">

<div class="menu">

<div class="sidebar">
<button onclick="show('aim')">🎯</button>
<button onclick="show('arma')">🔫</button>
<button onclick="show('div')">📦</button>
<button onclick="show('inj')">💉</button>
</div>

<div class="content">

<!-- AIM -->
<div id="aim" class="page">
<h3>AIMBOT</h3>

<div class="card">
Aimbot
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
Precisão
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
FOV <span id="fovv">50</span>
<input type="range" min="0" max="100" value="50" id="fov">
</div>

</div>

<!-- ARMA -->
<div id="arma" class="page">
<h3>ARMA</h3>

<div class="card">
Sem Recuo
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
Alta Precisão
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

</div>

<!-- DIVERSOS -->
<div id="div" class="page">
<h3>DIVERSOS</h3>

<div class="card">
120 FPS
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
Otimização
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

<div class="card">
Sem Lag
<label class="switch"><input type="checkbox"><span class="slider"></span></label>
</div>

</div>

<!-- INJEÇÃO -->
<div id="inj" class="page">
<h3>INJEÇÃO</h3>

<button onclick="inje()">INJETAR FF NORMAL</button>
<button onclick="inje()">INJETAR FF MAX</button>

<p id="status"></p>

</div>

</div>
</div>

</div>

<script>

// 🔑 LOGIN (NÃO ALTERADO)
const KEY_CORRETA = "Rkz-key-2026-aimbot";

function login(){
let k = document.getElementById("key").value.trim();

if(k !== KEY_CORRETA){
alert("Key inválida");
return;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("painel").style.display="block";

show("aim");
}

// MENU
function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}

// FOV
document.getElementById("fov").oninput=function(){
document.getElementById("fovv").innerText=this.value;
}

// ANIMAÇÃO
function inje(){
let s=document.getElementById("status");

s.innerHTML="🟢 Iniciando...";
setTimeout(()=>s.innerHTML+="<br>Carregando módulos...",1000);
setTimeout(()=>s.innerHTML+="<br>Finalizado ✅",2000);
}

/* PARTICULAS */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let p=[];

for(let i=0;i<100;i++){
p.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
r:Math.random()*2,
d:Math.random()*0.5
});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(255,0,120,0.4)";
p.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=e.d;
if(e.y>c.height){
e.y=0;
e.x=Math.random()*c.width;
}
});
}

setInterval(draw,30);

</script>

</body>
</html>
