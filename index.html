<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0014;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

/* FUNDO */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#2a004a,#000);
z-index:-2;
}

canvas{
position:fixed;
z-index:-1;
}

/* CARD */
.box{
width:260px;
background:rgba(30,0,50,0.85);
border-radius:18px;
padding:12px;
box-shadow:
0 0 30px rgba(140,0,255,0.7),
inset 0 0 20px rgba(140,0,255,0.2);
backdrop-filter:blur(20px);
}

/* HEADER */
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.top h3{
font-size:14px;
margin:0;
letter-spacing:1px;
}

/* MENU */
.flex{
display:flex;
}

/* SIDEBAR */
.side{
width:50px;
display:flex;
flex-direction:column;
gap:8px;
}

.icon{
height:45px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.05);
opacity:.6;
font-size:14px;
}

.icon.active{
background:linear-gradient(180deg,#a855f7,#6d28d9);
opacity:1;
}

/* CONTENT */
.content{
flex:1;
padding-left:8px;
}

/* GRID BOTÕES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

/* BOTÕES */
.opt{
background:rgba(255,255,255,0.05);
border-radius:10px;
padding:6px;
font-size:11px;
display:flex;
align-items:center;
gap:5px;
}

/* RADIO STYLE */
.circle{
width:12px;
height:12px;
border-radius:50%;
border:2px solid #aaa;
}

/* FOV */
.range{
margin-top:8px;
}

input[type=range]{
width:100%;
}

/* SELECT */
select{
width:100%;
padding:6px;
border-radius:8px;
background:#1a002b;
color:white;
border:none;
margin-top:6px;
}

/* BOTÃO */
.btn{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(180deg,#a855f7,#6d28d9);
color:white;
font-weight:bold;
}

/* FPS */
.fps{
text-align:center;
font-size:18px;
color:#c084fc;
margin-bottom:8px;
}

/* PAGES */
.page{display:none;}
.activePage{display:block;}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">

<div class="top">
<h3>ERICK AUXÍLIO</h3>
<span>🌙 ↗</span>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div class="side">
<div class="icon active" onclick="show('aim')">🎯</div>
<div class="icon" onclick="show('fps')">⚡</div>
<div class="icon" onclick="show('info')">ℹ️</div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- AIM -->
<div id="aim" class="page activePage">

<div class="grid">
<div class="opt"><div class="circle"></div> Ativar AimTrick</div>
<div class="opt"><div class="circle"></div> NoRecoil</div>
<div class="opt"><div class="circle"></div> aumentar precisão</div>
<div class="opt"><div class="circle"></div> Ativar AimLock</div>
</div>

<div class="range">
Regular FOV: [<span id="fovv">50</span>]
<input type="range" min="0" max="100" value="50" id="fov">
</div>

<select>
<option>Pescoço</option>
<option>Cabeça</option>
<option>Peito</option>
</select>

<button class="btn" onclick="injetar()">INJETAR</button>

</div>

<!-- FPS -->
<div id="fps" class="page">

<div class="fps">+61 FPS</div>

<div class="opt"><div class="circle"></div> Aumentar Contraste</div>
<div class="opt"><div class="circle"></div> Aumentar Fluidez</div>
<div class="opt"><div class="circle"></div> Aumentar Deslize</div>

</div>

<!-- INFO -->
<div id="info" class="page">

<div style="font-size:12px;line-height:1.5">
Criado por: <b>Erick</b><br><br>
Créditos: Erick Dev<br><br>
Modelo do telefone:<br>
Navegador Web<br><br>
<i>Dica: Ative no treinamento</i>
</div>

</div>

</div>
</div>

</div>

<script>

// troca páginas
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("activePage"));
document.getElementById(id).classList.add("activePage");

document.querySelectorAll(".icon").forEach(i=>i.classList.remove("active"));
event.target.classList.add("active");
}

// FOV
fov.oninput=()=>fovv.innerText=fov.value;

// botão
function injetar(){
alert("Sistema visual iniciado");
}

/* PARTICULAS */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,d:Math.random()});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(140,0,255,0.4)";
p.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=e.d;
if(e.y>c.height){e.y=0;e.x=Math.random()*c.width;}
});
}
setInterval(draw,30);

</script>

</body>
</html>
